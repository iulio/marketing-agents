# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

name: my-agent-i0paus
kind: hosted
protocols:
  - protocol: invocations
    version: 2.0.0
resources:
  cpu: ""
  memory: ""
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
description: >
  A getting-started agent that uses the GitHub Copilot SDK (CopilotClient) with the azure-ai-agentserver-invocations
  protocol, streaming raw session events as Server-Sent Events (SSE).
metadata:
  tags:
    - AI Agent Hosting
    - GitHub Copilot SDK
    - Invocations Protocol
    - Streaming
