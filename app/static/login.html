<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Marketing Agency - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0f1117; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid #2d333b; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass-card rounded-xl p-8 w-96 border border-[#30363d] shadow-2xl">
        <div class="text-center mb-6">
            <div class="text-3xl text-white mb-2"><i class="fa-regular fa-robot"></i></div>
            <h1 class="text-xl font-bold text-white">Agentic Marketing Agency</h1>
            <p class="text-gray-400 text-sm">Sign in to your account</p>
        </div>

        <form id="loginForm" onsubmit="login(event)" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 block mb-1">Email</label>
                <input type="email" id="email" value="admin@agency.com"
                    class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1">Password</label>
                <input type="password" id="password" value="admin123"
                    class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white py-2 rounded-md transition flex items-center justify-center gap-2">
                <i class="fa-regular fa-arrow-right-to-bracket"></i> Sign In
            </button>
            <div id="loginError" class="text-red-400 text-sm hidden text-center"></div>
        </form>

        <div class="mt-6 text-center text-gray-500 text-xs">
            <p>Default: admin@agency.com / admin123</p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            errorEl.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/api/auth/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
                    method: 'POST'
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    const err = await res.json();
                    errorEl.textContent = err.detail || 'Invalid credentials';
                    errorEl.classList.remove('hidden');
                }
            } catch (e) {
                errorEl.textContent = 'Login failed. Please try again.';
                errorEl.classList.remove('hidden');
                console.error('Login error:', e);
            }
        }

        // If already logged in, redirect to dashboard
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
