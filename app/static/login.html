<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agentic Marketing</title>
    <!-- Tailwind CSS (reliable CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --prussian: #1d3557;
            --honeydew: #f1faee;
            --nonphoto: #a8dadc;
            --celadon: #457b9d;
            --imperial: #e63946;
        }

        body {
            background-color: var(--prussian) !important;
            color: var(--honeydew) !important;
            font-family: 'Inter', sans-serif;
        }

        .glass-card, [class*="glass-card"] {
            background: #15263f !important;
            border-color: var(--celadon) !important;
        }

        input, [class*="bg-[#0d1117]"] {
            background-color: #101c2e !important;
            border-color: var(--celadon) !important;
            color: var(--honeydew) !important;
        }
        input:focus {
            border-color: var(--nonphoto) !important;
            outline: none !important;
        }

        button, .bg-\[\#238636\], [class*="bg-[#238636]"] {
            background-color: var(--celadon) !important;
            color: var(--honeydew) !important;
        }
        button:hover, [class*="hover:bg-[#2ea043]"]:hover {
            background-color: var(--nonphoto) !important;
            color: var(--prussian) !important;
        }

        .text-gray-400, .text-gray-500 {
            color: var(--nonphoto) !important;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass-card rounded-xl p-8 w-96 border border-[#30363d] shadow-2xl">
        <div class="text-center mb-6">
            <div class="flex justify-center mb-4">
                <img src="/logo.png" alt="Logo" class="w-16 h-16 object-contain">
            </div>
            <h1 class="text-xl font-bold text-white">Agentic Marketing Agency</h1>
            <p class="text-gray-400 text-sm">Sign in to your account</p>
        </div>

        <form id="loginForm" onsubmit="login(event)" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 block mb-1">Email</label>
                <input type="email" id="email" value="admin@agency.com" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1">Password</label>
                <input type="password" id="password" placeholder="Password" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white py-2 rounded-md transition flex items-center justify-center gap-2">
                <i class="fa-regular fa-arrow-right-to-bracket"></i> Sign In
            </button>
            <div id="loginError" class="text-red-400 text-sm hidden text-center"></div>
        </form>

        <div class="mt-6 text-center text-gray-500 text-xs">
            <p>Use the admin password stored in Secret Manager.</p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            errorEl.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('expires_at', String(data.expires_at));
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    const err = await res.json();
                    errorEl.textContent = Array.isArray(err.detail)
                        ? err.detail.map(item => item.msg).join(', ')
                        : (err.detail || 'Invalid credentials');
                    errorEl.classList.remove('hidden');
                }
            } catch (e) {
                errorEl.textContent = 'Login failed. Please try again.';
                errorEl.classList.remove('hidden');
                console.error('Login error:', e);
            }
        }

        // If already logged in, redirect to dashboard
        if (sessionStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
