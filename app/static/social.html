<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --imperial: #e63946; --honeydew: #f1faee; --nonphoto: #a8dadc; --celadon: #457b9d; --prussian: #1d3557; }
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
        .btn-primary { background: var(--celadon); color: #fff; padding: 0.5rem 1rem; border-radius: 0.5rem; }
        .btn-primary:hover { background: #3a6b8a; }
        .input { background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #e2e8f0; width: 100%; }
        .platform-icon { width: 2rem; height: 2rem; border-radius: 0.5rem; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold text-white"><i class="fa-solid fa-hashtag text-[var(--imperial)] mr-2"></i>Social Media Generator</h1>
                <p class="text-slate-400 text-sm mt-1">AI-generated social media content for Facebook, LinkedIn, Twitter, and Instagram</p>
            </div>
            <a href="/" class="text-slate-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div class="card p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4"><i class="fa-solid fa-wand-magic-sparkles text-[var(--nonphoto)] mr-2"></i>Generate Posts</h2>
            <form id="socialForm" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Campaign / Content Description</label>
                    <textarea id="sgDescription" class="input" rows="3" placeholder="Describe your campaign, product launch, or content offer..." required></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm mb-1">Tone</label>
                        <select id="sgTone" class="input">
                            <option value="professional">Professional</option>
                            <option value="casual">Casual</option>
                            <option value="humorous">Humorous</option>
                            <option value="inspirational">Inspirational</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Target Audience</label>
                        <input type="text" id="sgAudience" class="input" placeholder="marketers, CEOs, developers">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Posts per Platform</label>
                        <select id="sgCount" class="input">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm mb-2">Platforms</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2"><input type="checkbox" id="platFacebook" checked> Facebook</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="platLinkedin" checked> LinkedIn</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="platTwitter" checked> Twitter / X</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="platInstagram" checked> Instagram</label>
                    </div>
                </div>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2"><input type="checkbox" id="sgHashtags" checked> Include Hashtags</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="sgCta" checked> Include CTA</label>
                </div>
                <button type="submit" class="btn-primary"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i> Generate Posts</button>
                <div id="sgStatus" class="text-sm"></div>
            </form>
        </div>

        <div id="sgResults" class="hidden space-y-6"></div>

        <div class="card p-6 mt-6">
            <h2 class="text-lg font-semibold mb-4"><i class="fa-solid fa-flask text-[var(--nonphoto)] mr-2"></i> A/B Test Variants</h2>
            <p class="text-sm text-slate-400 mb-3">Generate multiple variants of a base post for A/B testing.</p>
            <form id="variantForm" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Base Post</label>
                    <textarea id="variantBase" class="input" rows="3"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm mb-1">Platform</label>
                        <select id="variantPlatform" class="input">
                            <option value="facebook">Facebook</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="twitter">Twitter / X</option>
                            <option value="instagram">Instagram</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Variations</label>
                        <select id="variantCount" class="input">
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary"><i class="fa-solid fa-flask mr-1"></i> Generate Variants</button>
                <div id="variantStatus" class="text-sm"></div>
            </form>
            <div id="variantResults" class="hidden mt-6 space-y-4"></div>
        </div>
    </div>

    <script>
        const PLATFORM_COLORS = { facebook: '#1877f2', linkedin: '#0a66c2', twitter: '#1da1f2', instagram: '#e4405f' };
        const PLATFORM_ICONS = { facebook: 'fa-brands fa-facebook-f', linkedin: 'fa-brands fa-linkedin-in', twitter: 'fa-brands fa-x-twitter', instagram: 'fa-brands fa-instagram' };

        document.getElementById('socialForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('sgStatus');
            status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generating posts...';
            const platforms = ['facebook', 'linkedin', 'twitter', 'instagram'].filter(p => document.getElementById(`plat${p.charAt(0).toUpperCase() + p.slice(1)}`).checked);

            try {
                const res = await fetch('/api/social/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        campaign_description: document.getElementById('sgDescription').value,
                        platforms,
                        tone: document.getElementById('sgTone').value,
                        target_audience: document.getElementById('sgAudience').value,
                        post_count: parseInt(document.getElementById('sgCount').value),
                        include_hashtags: document.getElementById('sgHashtags').checked,
                        include_cta: document.getElementById('sgCta').checked,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Error');
                renderSocialPosts(data);
                status.innerHTML = '<span class="text-green-400"><i class="fa-solid fa-check-circle"></i> Posts generated</span>';
            } catch (err) {
                status.innerHTML = `<span class="text-red-400">${err.message}</span>`;
            }
        });

        function renderSocialPosts(data) {
            const container = document.getElementById('sgResults');
            container.classList.remove('hidden');
            container.innerHTML = '';
            Object.entries(data).forEach(([platform, posts]) => {
                const section = document.createElement('div');
                section.className = 'card p-6';
                const color = PLATFORM_COLORS[platform] || '#6366f1';
                const icon = PLATFORM_ICONS[platform] || 'fa-solid fa-globe';
                section.innerHTML = `<h3 class="text-lg font-bold mb-4 flex items-center gap-2"><span class="platform-icon" style="background:${color}"><i class="${icon}"></i></span> ${platform.charAt(0).toUpperCase() + platform.slice(1)}</h3>`;
                const postsDiv = document.createElement('div');
                postsDiv.className = 'space-y-4';
                (posts || []).forEach((post, idx) => {
                    const p = document.createElement('div');
                    p.className = 'bg-slate-800 rounded-lg p-4 border-l-4';
                    p.style.borderLeftColor = color;
                    p.innerHTML = `
                        <div class="flex items-center justify-between mb-1"><span class="text-xs text-slate-400">Post #${idx + 1}</span></div>
                        <p class="text-sm whitespace-pre-wrap">${post.post_text || ''}</p>
                        ${post.hashtags ? `<p class="text-xs text-[var(--nonphoto)] mt-2">${post.hashtags.join(' ')}</p>` : ''}
                        ${post.cta ? `<p class="text-xs text-green-400 mt-1"><i class="fa-solid fa-arrow-pointer mr-1"></i>${post.cta}</p>` : ''}
                        ${post.image_description ? `<p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-image mr-1"></i>${post.image_description}</p>` : ''}
                    `;
                    postsDiv.appendChild(p);
                });
                section.appendChild(postsDiv);
                container.appendChild(section);
            });
        }

        document.getElementById('variantForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('variantStatus');
            status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generating variants...';
            try {
                const res = await fetch('/api/social/variants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base_post: document.getElementById('variantBase').value,
                        platform: document.getElementById('variantPlatform').value,
                        variations: parseInt(document.getElementById('variantCount').value),
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Error');
                const container = document.getElementById('variantResults');
                container.classList.remove('hidden');
                container.innerHTML = '';
                (data || []).forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'card p-4 border-l-4';
                    div.style.borderLeftColor = v.variant === 'A' ? '#22c55e' : '#3b82f6';
                    div.innerHTML = `
                        <div class="flex items-center justify-between"><span class="font-bold text-lg">Variant ${v.variant}</span></div>
                        <p class="text-sm whitespace-pre-wrap mt-2">${v.post_text || ''}</p>
                        ${v.hook ? `<p class="text-xs text-[var(--nonphoto)] mt-1"><i class="fa-solid fa-fish mr-1"></i>Hook: ${v.hook}</p>` : ''}
                        ${v.cta ? `<p class="text-xs text-green-400 mt-1"><i class="fa-solid fa-arrow-pointer mr-1"></i>CTA: ${v.cta}</p>` : ''}
                        ${v.reasoning ? `<p class="text-xs text-slate-400 mt-1 italic">${v.reasoning}</p>` : ''}
                    `;
                    container.appendChild(div);
                });
                status.innerHTML = '<span class="text-green-400"><i class="fa-solid fa-check-circle"></i> Variants generated</span>';
            } catch (err) {
                status.innerHTML = `<span class="text-red-400">${err.message}</span>`;
            }
        });
    </script>
</body>
</html>
