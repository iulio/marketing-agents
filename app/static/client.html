<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard - Agentic Marketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --prussian: #1d3557;
            --honeydew: #f1faee;
            --nonphoto: #a8dadc;
            --celadon: #457b9d;
            --imperial: #e63946;
        }

        body {
            background-color: var(--prussian) !important;
            color: var(--honeydew) !important;
            font-family: 'Inter', sans-serif;
        }

        .glass-card, [class*="glass-card"] {
            background: #15263f !important;
            border-color: var(--celadon) !important;
        }

        .status-badge-active { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status-badge-pending { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-badge-draft { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }

        .text-gray-400 {
            color: var(--nonphoto) !important;
        }

        button {
            color: var(--nonphoto) !important;
        }
        button:hover {
            color: var(--honeydew) !important;
        }
    </style>
</head>
<body class="text-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <img src="/logo.png" alt="Logo" class="w-10 h-10 object-contain">
                <div>
                    <h1 class="text-2xl font-bold text-white">My Marketing Dashboard</h1>
                    <p class="text-gray-400 text-xs" id="clientName">Loading...</p>
                </div>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-4 gap-4 mb-6" id="summaryCards">
            <div class="glass-card rounded-lg p-4">
                <p class="text-gray-400 text-xs uppercase tracking-wider">Total Campaigns</p>
                <p class="text-2xl font-bold" id="totalCampaigns">0</p>
            </div>
            <div class="glass-card rounded-lg p-4">
                <p class="text-gray-400 text-xs uppercase tracking-wider">Active Campaigns</p>
                <p class="text-2xl font-bold" id="activeCampaigns">0</p>
            </div>
            <div class="glass-card rounded-lg p-4">
                <p class="text-gray-400 text-xs uppercase tracking-wider">Total Spend</p>
                <p class="text-2xl font-bold" id="totalSpend">€0.00</p>
            </div>
            <div class="glass-card rounded-lg p-4">
                <p class="text-gray-400 text-xs uppercase tracking-wider">Campaigns Pending</p>
                <p class="text-2xl font-bold" id="pendingCampaigns">0</p>
            </div>
        </div>

        <!-- Campaigns Table -->
        <div class="glass-card rounded-lg p-5 border border-[#30363d] overflow-x-auto">
            <h2 class="text-lg font-semibold mb-4">Your Campaigns</h2>
            <table class="w-full text-sm">
                <thead class="text-gray-400 border-b border-[#30363d]">
                    <tr class="text-left">
                        <th class="pb-2 font-medium">Campaign</th>
                        <th class="pb-2 font-medium">Status</th>
                        <th class="pb-2 font-medium">Budget</th>
                        <th class="pb-2 font-medium">Creatives</th>
                        <th class="pb-2 font-medium">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-[#21262d]" id="campaignTableBody">
                    <tr><td colspan="5" class="text-center text-gray-400 py-4">No campaigns found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function getToken() {
            return sessionStorage.getItem('token');
        }

        function getHeaders() {
            return {
                'Authorization': `Bearer ${getToken()}`,
                'Content-Type': 'application/json'
            };
        }

        function formatEuroAmount(value) {
            const numeric = typeof value === 'number' ? value : Number(String(value ?? 0).replace(/[^0-9.-]/g, ''));
            if (!Number.isFinite(numeric)) return '€0.00';
            return new Intl.NumberFormat('en-IE', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(numeric);
        }


        async function loadDashboard() {
            try {
                const res = await fetch(`${API_BASE}/api/client-dashboard`, { headers: getHeaders() });
                if (!res.ok) throw new Error('Failed to load dashboard');
                const data = await res.json();
                document.getElementById('clientName').textContent = data.client_info?.name || 'Client';
                const summary = data.summary || {};
                document.getElementById('totalCampaigns').textContent = summary.total_campaigns || 0;
                document.getElementById('activeCampaigns').textContent = summary.active_campaigns || 0;
                document.getElementById('totalSpend').textContent = formatEuroAmount(summary.total_spend);
                document.getElementById('pendingCampaigns').textContent = data.campaigns?.filter(c => c.status === 'pending_review').length || 0;

                const tbody = document.getElementById('campaignTableBody');
                tbody.innerHTML = '';
                const campaigns = data.campaigns || [];
                if (campaigns.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-gray-400 py-4">No campaigns yet.</td></tr>';
                    return;
                }

                campaigns.forEach(c => {
                    const statusClass = {
                        'active': 'status-badge-active',
                        'pending_review': 'status-badge-pending',
                        'draft': 'status-badge-draft'
                    }[c.status] || 'status-badge-draft';

                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-[#161b22] transition';
                    tr.innerHTML = `
                        <td class="py-3 font-medium">${c.name || 'Unnamed'}</td>
                        <td><span class="${statusClass} px-2 py-0.5 rounded-full text-xs capitalize">${c.status || 'unknown'}</span></td>
                        <td>${formatEuroAmount(c.budget)} / day</td>
                        <td>
                            Google: ${c.creatives?.google_ads || 0} |
                            Meta: ${c.creatives?.meta_ads || 0} |
                            Images: ${c.creatives?.images || 0}
                        </td>
                        <td>
                            <button onclick="viewCampaign('${c.campaign_id}')" class="text-blue-400 hover:text-blue-300">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                            <button onclick="downloadReport('${c.campaign_id}')" class="text-green-400 hover:text-green-300 ml-2">
                                <i class="fa-regular fa-file-pdf"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error('Failed to load dashboard:', e);
                if (e.status === 401) {
                    window.location.href = '/login.html';
                }
            }
        }

        function logout() {
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        async function viewCampaign(campaignId) {
            try {
                // Fetch the client's campaigns list and find this one
                const user = JSON.parse(sessionStorage.getItem('user') || '{}');
                const clientId = user.client_id;
                const res = await fetch(`${API_BASE}/api/clients/${clientId}/campaigns`, { headers: getHeaders() });
                if (!res.ok) throw new Error('Failed to load campaign details');
                const data = await res.json();
                const campaign = (data.campaigns || []).find(c => c.campaign_id === campaignId);
                if (!campaign) { alert('Campaign details not found.'); return; }
                alert([
                    `Campaign: ${campaign.campaign_name || campaignId}`,
                    `Status: ${campaign.status}`,
                    `Budget: €${campaign.budget} / day`,
                    `Language: ${campaign.language}`,
                    `Start: ${campaign.start_date || 'N/A'}  End: ${campaign.end_date || 'N/A'}`,
                    `Google verified: ${campaign.google_campaign_verified ? 'Yes' : 'No'}`,
                    `Meta verified: ${campaign.meta_campaign_verified ? 'Yes' : 'No'}`,
                ].join('\n'));
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function downloadReport(campaignId) {
            try {
                const res = await fetch(`${API_BASE}/api/campaigns/${campaignId}/report`, { headers: getHeaders() });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Failed to download report');
                }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${campaignId}_report.pdf`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function tokenExpirySeconds() {
            const stored = sessionStorage.getItem('expires_at');
            if (stored) {
                const exp = parseInt(stored, 10);
                if (isNaN(exp)) return -1;
                return exp - Math.floor(Date.now() / 1000);
            }
            const token = sessionStorage.getItem('token');
            if (!token) return -1;
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp) {
                    sessionStorage.setItem('expires_at', String(payload.exp));
                    return payload.exp - Math.floor(Date.now() / 1000);
                }
            } catch (_) {}
            return -1;
        }

        function checkTokenExpiry() {
            const remaining = tokenExpirySeconds();
            if (remaining <= 20) {
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('expires_at');
                sessionStorage.removeItem('user');
                window.location.href = '/login.html';
            }
        }

        (function initExpiryWatcher() {
            tokenExpirySeconds();
            setInterval(checkTokenExpiry, 10000);
        })();

        document.addEventListener('DOMContentLoaded', () => {
            if (!getToken()) {
                window.location.href = '/login.html';
                return;
            }
            loadDashboard();
        });
    </script>
<script src="/bug_reporter.js" defer></script>
</body>
</html>
