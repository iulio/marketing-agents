services:
  postgres:
    image: postgres:15-alpine
    container_name: marketing-postgres
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing123
      POSTGRES_DB: marketing_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketing -d marketing_agents"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketing_network

  app:
    build: .
    container_name: marketing-agents
    environment:
      DATABASE_URL: postgresql+asyncpg://marketing:marketing123@postgres:5432/marketing_agents
      AUTO_OPTIMIZE: "true"
      OPTIMIZATION_INTERVAL: 60
      JWT_SECRET_KEY: your-secret-key-change-in-production
      GCP_PROJECT_ID: marketing-online-500822
      GCP_LOCATION: global
      GOOGLE_CLOUD_LOCATION: global
      GEMINI_MODEL: gemini-2.5-flash
      LLM_MAX_TOKENS: 4096
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - marketing_network

volumes:
  postgres_data:

networks:
  marketing_network:
    driver: bridge
